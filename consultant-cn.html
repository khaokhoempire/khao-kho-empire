<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目顾问 | Khao Kho Empire</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Noto Sans SC',sans-serif;background:#f6f6f2;color:#2f3e2e;}
html{scroll-behavior:smooth;}

.main-nav{
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#1f2e20;
}

.logo{
font-family:'Playfair Display',serif;
color:white;text-decoration:none;font-size:22px;
}

.back-btn{
color:white;text-decoration:none;
border:1px solid white;padding:6px 14px;
border-radius:20px;font-size:13px;
}

.page-hero{
padding:120px 12% 60px 12%;
text-align:center;
}

.page-hero h1{
font-family:'Playfair Display',serif;
font-size:42px;margin-bottom:15px;
}

.consultant-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:50px;padding:0 12% 120px 12%;
}

.consultant-card{
background:white;padding:40px 30px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
text-align:center;transition:0.3s;
}

.consultant-card:hover{transform:translateY(-8px);}

.consultant-card img{
width:150px;height:150px;border-radius:50%;
object-fit:cover;margin-bottom:20px;
}

.role{font-size:14px;color:#888;margin-bottom:15px;}
.desc{font-size:15px;color:#555;margin-bottom:25px;line-height:1.6;}

.buttons{
display:flex;justify-content:center;gap:15px;flex-wrap:wrap;
}

.btn-solid{
padding:10px 25px;border-radius:30px;
background:#1e2a1f;color:white;text-decoration:none;font-size:14px;
}

.btn-outline{
padding:10px 25px;border-radius:30px;
border:1px solid #1e2a1f;color:#1e2a1f;text-decoration:none;font-size:14px;
}

.btn-outline:hover{background:#1e2a1f;color:white;}

@media(max-width:768px){
.page-hero{padding:100px 8% 50px;}
.consultant-grid{padding:0 8% 80px;}
}
</style>
</head>

<body>

<nav class="main-nav">
<a href="index.html" class="logo">Khao Kho Empire</a>
<a href="index.html" class="back-btn">← 返回首页</a>
</nav>

<section class="page-hero">
<h1>项目顾问</h1>
<p>提供私人土地投资与开发咨询服务</p>
</section>

<section class="consultant-grid">

<div class="consultant-card">
<img src="consultant1.jpg" alt="">
<h3>Venus 女士</h3>
<p class="role">高级土地投资顾问</p>
<p class="desc">
专注于高端山地土地收购与豪华别墅开发咨询
</p>
<div class="buttons">
<a href="tel:0620582662" class="btn-outline">电话</a>
<a href="https://line.me/ti/p/@venusproperty" target="_blank" class="btn-solid">LINE</a>
</div>
</div>

<div class="consultant-card">
<img src="consultant2.jpg" alt="">
<h3>Alex 先生</h3>
<p class="role">国际投资顾问</p>
<p class="desc">
协助海外投资者进行土地结构规划与回报策略设计
</p>
<div class="buttons">
<a href="tel:0812345678" class="btn-outline">电话</a>
<a href="#" class="btn-solid">LINE</a>
</div>
</div>

</section>

</body>
</html>
