<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khao Kho Empire</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:#f5f5f2;
    color:#1e2d24;
}

header{
    background:#1f3a2e;
    color:white;
    padding:20px 10%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:999;
}

header h1{
    font-family:'Playfair Display', serif;
    margin:0;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:300;
}

.lang-btn{
    background:white;
    color:#1f3a2e;
    border:none;
    padding:5px 12px;
    margin-left:10px;
    cursor:pointer;
    border-radius:20px;
}

.hero{
    padding:120px 10%;
    background:linear-gradient(rgba(31,58,46,0.6),rgba(31,58,46,0.6)),
    url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover;
    color:white;
    text-align:center;
}

.hero h2{
    font-family:'Playfair Display', serif;
    font-size:48px;
    margin-bottom:20px;
}

section{
    padding:80px 10%;
    text-align:center;
}

section h2{
    font-family:'Playfair Display', serif;
    font-size:36px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.gallery img{
    width:100%;
    border-radius:15px;
}

.line-btn{
    position:fixed;
    right:30px;
    bottom:30px;
    background:#06C755;
    color:white;
    padding:15px 25px;
    border-radius:50px;
    text-decoration:none;
    font-weight:500;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>
<h1>Khao Kho Empire</h1>
<div>
<button class="lang-btn" onclick="setLang('en')">EN</button>
<button class="lang-btn" onclick="setLang('th')">TH</button>
</div>
</header>

<div class="hero">
<h2 id="hero-title"></h2>
<p id="hero-sub"></p>
</div>

<section>
<h2 id="land-title"></h2>
<p id="land-desc"></p>
</section>

<section>
<h2 id="dev-title"></h2>
<div class="grid">
<div class="card" id="dev1"></div>
<div class="card" id="dev2"></div>
<div class="card" id="dev3"></div>
</div>
</section>

<section class="gallery">
<h2>Luxury Gallery</h2>
<div class="grid">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3">
</div>
</section>

<a class="line-btn" href="https://line.me/R/ti/p/@venusproperty" target="_blank">
Add LINE Official
</a>

<script>

const content = {
en:{
heroTitle:"Strategic Mountain Land & Luxury Development Opportunity",
heroSub:"Land parcels from 100 sq.wah to 100+ Rai in Khao Kho, Phetchabun",
landTitle:"Land Portfolio",
landDesc:"Flexible land sizes suitable for private villas, boutique resorts, wellness retreats, and large-scale integrated developments.",
devTitle:"Development Possibilities",
dev1:"Luxury Pool Villa Development",
dev2:"Boutique Resort & Wellness Retreat",
dev3:"Strategic Land Banking Opportunity"
},
th:{
heroTitle:"โอกาสการพัฒนาที่ดินภูเขาระดับพรีเมียม เขาค้อ เพชรบูรณ์",
heroSub:"ที่ดินตั้งแต่ 100 ตารางวา ถึงมากกว่า 100 ไร่",
landTitle:"รูปแบบที่ดิน",
landDesc:"มีขนาดหลากหลาย รองรับการพัฒนา Pool Villa รีสอร์ท บูทีคโฮเทล และโครงการขนาดใหญ่",
devTitle:"แนวทางการพัฒนา",
dev1:"พัฒนา Luxury Pool Villa",
dev2:"รีสอร์ทและศูนย์ Wellness",
dev3:"โอกาสสะสมที่ดินเชิงกลยุทธ์"
}
};

function setLang(lang){
document.getElementById("hero-title").innerText = content[lang].heroTitle;
document.getElementById("hero-sub").innerText = content[lang].heroSub;
document.getElementById("land-title").innerText = content[lang].landTitle;
document.getElementById("land-desc").innerText = content[lang].landDesc;
document.getElementById("dev-title").innerText = content[lang].devTitle;
document.getElementById("dev1").innerText = content[lang].dev1;
document.getElementById("dev2").innerText = content[lang].dev2;
document.getElementById("dev3").innerText = content[lang].dev3;
}

setLang('en');

</script>

</body>
</html>
