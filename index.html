<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khao Kho Empire</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#f6f6f2;color:#2f3e2e;}

/* NAVBAR (No Logo - Premium Minimal) */
nav{
position:fixed;
width:100%;
padding:22px 70px;
display:flex;
justify-content:flex-end;
align-items:center;
z-index:1000;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
transition:all 0.4s ease;
}

.lang-switch button{
margin-left:10px;
padding:8px 16px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.5);
background:transparent;
color:white;
cursor:pointer;
font-weight:500;
transition:all 0.3s ease;
}

.lang-switch button:hover{
background:white;
color:#1e2a1f;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(20,40,20,0.5),rgba(20,40,20,0.5)),url('hidden gem.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:0 20px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:55px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
}

.btn{
padding:14px 35px;
border-radius:30px;
border:none;
background:#d6e5d8;
color:#1e2a1f;
font-weight:500;
cursor:pointer;
text-decoration:none;
display:inline-block;
transition:0.3s;
}

.btn:hover{
background:#ffffff;
}

/* SECTION */
.section{padding:100px 12%;}
.section h2{
font-family:'Playfair Display',serif;
font-size:40px;
margin-bottom:30px;
text-align:center;
}

.two-col{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
align-items:center;
}

.two-col img{
width:100%;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:15px;
}

/* FOOTER */
footer{
background:#1f2e20;
color:#ccc;
text-align:center;
padding:30px;
margin-top:60px;
}

/* LINE BUTTON */
.line-btn{
position:fixed;
bottom:25px;
right:25px;
background:#06c755;
color:white;
padding:15px 22px;
border-radius:50px;
text-decoration:none;
font-weight:500;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* RESPONSIVE */
@media(max-width:900px){
.two-col{grid-template-columns:1fr;}
.hero h1{font-size:38px;}
nav{padding:15px 25px;}
}
</style>
</head>

<body>

<nav>
<div class="lang-switch">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('th')">TH</button>
<button onclick="setLang('cn')">中文</button>
</div>
</nav>

<section class="hero">
<div>
<h1 id="hero-title"></h1>
<p id="hero-sub"></p>
<a href="https://line.me/ti/p/@venusproperty" target="_blank" class="btn" id="hero-btn"></a>
</div>
</section>

<section class="section">
<h2 id="about-title"></h2>
<div class="two-col">
<div>
<p id="about-text" style="line-height:1.8;font-size:18px;"></p>
</div>
<div>
<img src="villa1.jpg" alt="">
</div>
</div>
</section>

<section class="section" style="background:#e8efe8;">
<div class="two-col">
<div>
<img src="villa2.jpg" alt="">
</div>
<div>
<h2 id="invest-title"></h2>
<p id="invest-text" style="line-height:1.8;font-size:18px;"></p>
</div>
</div>
</section>

<section class="section">
<h2>Luxury Gallery</h2>
<div class="gallery">
<img src="gallery1.jpg" alt="">
<img src="gallery2.jpg" alt="">
<img src="gallery3.jpg" alt="">
<img src="gallery4.jpg" alt="">
<img src="gallery5.jpg" alt="">
<img src="gallery6.jpg" alt="">
<img src="gallery7.jpg" alt="">
<img src="gallery8.jpg" alt="">
<img src="gallery9.jpg" alt="">
<img src="gallery10.jpg" alt="">
</div>
</section>

<section class="section">
<h2>Project Location</h2>
<div style="border-radius:20px;overflow:hidden;box-shadow:0 15px 40px rgba(0,0,0,0.15);">
<iframe 
src="https://www.google.com/maps?q=16.621000,101.041889&hl=en&z=15&output=embed"
width="100%" 
height="450" 
style="border:0;" 
allowfullscreen 
loading="lazy">
</iframe>
</div>
</section>

<footer>
© 2026 Khao Kho Empire. All Rights Reserved.
</footer>

<a href="https://line.me/ti/p/@venusproperty" target="_blank" class="line-btn">
💬 Add LINE Official
</a>

<script>
const content={
en:{
heroTitle:"Khao Kho Empire",
heroSub:"Luxury Mountain Land & Pool Villa House",
heroBtn:"Private Consultation",
aboutTitle:"About The Estate",
aboutText:"Nestled in pristine mountain landscapes, offering panoramic views and cool climate year-round.",
investTitle:"Investment Vision",
investText:"Strategically positioned for luxury villa development and boutique resorts."
},
th:{
heroTitle:"Khao Kho Empire",
heroSub:"ที่ดินภูเขาและพูลวิลล่าระดับลักชัวรี",
heroBtn:"ติดต่อเรา",
aboutTitle:"เกี่ยวกับโครงการ",
aboutText:"ที่ดินวิวภูเขา อากาศเย็นตลอดปี เหมาะสำหรับการพัฒนาโครงการระดับพรีเมียม",
investTitle:"วิสัยทัศน์การลงทุน",
investText:"รองรับการพัฒนา Pool Villa และโครงการหรู"
},
cn:{
heroTitle:"Khao Kho Empire",
heroSub:"高端山地土地与豪华泳池别墅",
heroBtn:"联系我们",
aboutTitle:"项目介绍",
aboutText:"位于纯净山景之中，全年气候凉爽。",
investTitle:"投资愿景",
investText:"适合开发豪华别墅及精品度假项目。"
}
};

function setLang(lang){
document.getElementById("hero-title").innerText=content[lang].heroTitle;
document.getElementById("hero-sub").innerText=content[lang].heroSub;
document.getElementById("hero-btn").innerText=content[lang].heroBtn;
document.getElementById("about-title").innerText=content[lang].aboutTitle;
document.getElementById("about-text").innerText=content[lang].aboutText;
document.getElementById("invest-title").innerText=content[lang].investTitle;
document.getElementById("invest-text").innerText=content[lang].investText;
}

setLang('en');
</script>

</body>
</html>
