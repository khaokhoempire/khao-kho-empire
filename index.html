<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khao Kho Empire</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

/* COLOR SYSTEM */
:root{
--primary-bg:#cfd8cf;
--section-soft:#dbe5db;
--deep-green:#2f3e2e;
--text-soft:#4a5a49;
--card-bg:#ffffff;
--accent:#d6e5d8;
--accent-hover:#ffffff;
--nav-bg:rgba(47,62,46,0.85);
}

body{
font-family:'Inter',sans-serif;
background:var(--primary-bg);
color:var(--deep-green);
}

.container{
max-width:1200px;
margin:0 auto;
padding:0 40px;
}

.section{
padding:120px 0;
background:var(--primary-bg);
}

.section h2{
font-family:'Playfair Display',serif;
font-size:40px;
margin-bottom:30px;
text-align:center;
color:var(--deep-green);
}

/* NAVBAR */
.main-nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:22px 40px;
display:flex;
justify-content:center;
background:var(--nav-bg);
backdrop-filter:blur(14px);
z-index:1000;
}

.main-nav-inner{
width:100%;
max-width:1200px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-family:'Playfair Display',serif;
color:white;
text-decoration:none;
font-size:22px;
}

.nav-links{
display:flex;
gap:35px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:15px;
transition:0.3s;
}

.nav-links a:hover{opacity:0.7;}

.lang-switch button{
margin-left:10px;
padding:8px 16px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.6);
background:transparent;
color:white;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

.lang-switch button:hover{
background:white;
color:var(--deep-green);
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(47,62,46,0.55),rgba(47,62,46,0.55)),url('hidden gem.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:0 20px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:55px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
}

.btn{
padding:14px 35px;
border-radius:30px;
border:none;
background:var(--accent);
color:var(--deep-green);
font-weight:500;
cursor:pointer;
text-decoration:none;
display:inline-block;
transition:0.3s;
}

.btn:hover{background:var(--accent-hover);}

/* TWO COL */
.two-col{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
align-items:center;
}

.two-col img{
width:100%;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* INVESTMENT */
.investment-section{
background:var(--section-soft);
padding:140px 0;
}

.investment-wrapper{
display:flex;
align-items:center;
justify-content:space-between;
gap:80px;
}

.investment-image img{
width:100%;
max-width:700px;
border-radius:30px;
box-shadow:0 30px 60px rgba(0,0,0,0.15);
}

.investment-content{
max-width:500px;
}

.investment-content h2{
font-family:'Playfair Display', serif;
font-size:52px;
margin-bottom:25px;
}

.investment-content p{
font-size:20px;
line-height:1.8;
color:var(--text-soft);
}

/* PURPOSE */
.purpose-section{
padding:160px 0;
background:var(--primary-bg);
text-align:center;
}

.purpose-title{
font-family:'Playfair Display',serif;
font-size:48px;
margin-bottom:20px;
}

.purpose-sub{
max-width:700px;
margin:0 auto 90px auto;
font-size:20px;
color:var(--text-soft);
}

.purpose-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:50px;
}

.purpose-card{
background:var(--card-bg);
border-radius:28px;
overflow:hidden;
box-shadow:0 30px 60px rgba(0,0,0,0.12);
transition:0.4s ease;
}

.purpose-card:hover{
transform:translateY(-15px);
box-shadow:0 40px 80px rgba(0,0,0,0.18);
}

.purpose-card img{
width:100%;
height:260px;
object-fit:cover;
}

.purpose-content{
padding:40px;
}

.purpose-content h3{
font-family:'Playfair Display',serif;
font-size:26px;
margin-bottom:15px;
}

.purpose-content p{
color:var(--text-soft);
margin-bottom:25px;
line-height:1.7;
}

.purpose-btn{
display:inline-block;
padding:14px 32px;
border-radius:30px;
background:var(--accent);
color:var(--deep-green);
text-decoration:none;
font-weight:500;
transition:0.3s;
}

.purpose-btn:hover{
background:var(--accent-hover);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.gallery img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:16px;
transition:0.4s ease;
}

.gallery img:hover{
transform:scale(1.05);
}

/* MAP */
.map-container{
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* FOOTER */
footer{
background:var(--deep-green);
color:#ccc;
text-align:center;
padding:30px;
margin-top:60px;
}

/* LINE */
.line-btn{
position:fixed;
bottom:25px;
right:25px;
background:#06c755;
color:white;
padding:15px 22px;
border-radius:50px;
text-decoration:none;
font-weight:500;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>
