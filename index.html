<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khao Kho Empire</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f6f6f2;color:#2f3e2e;}
html{scroll-behavior:smooth;}

/* NAV */
.main-nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(14px);
z-index:1000;
}

.logo{
font-family:'Playfair Display',serif;
color:white;
text-decoration:none;
font-size:22px;
}

.nav-links a{
color:white;
text-decoration:none;
margin-left:30px;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(20,40,20,0.5),rgba(20,40,20,0.5)),url('hidden gem.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:0 20px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:55px;
margin-bottom:20px;
}

.section{
padding:120px 12%;
}

.section h2{
font-family:'Playfair Display',serif;
font-size:40px;
text-align:center;
margin-bottom:40px;
}

/* ===== PROFESSIONAL SLIDER ===== */

.slider{
position:relative;
max-width:1200px;
margin:auto;
overflow:hidden;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

.slides{
display:flex;
transition:transform 0.8s ease-in-out;
}

.slides img{
width:100%;
flex-shrink:0;
height:520px;
object-fit:cover;
}

/* Buttons */
.prev, .next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
padding:15px 20px;
cursor:pointer;
font-size:22px;
border-radius:50%;
transition:0.3s;
}

.prev:hover, .next:hover{
background:#1e2a1f;
}

.prev{left:20px;}
.next{right:20px;}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:32px;}
.section{padding:80px 8%;}
.slides img{height:260px;}
.prev, .next{padding:10px 14px;font-size:18px;}
}
</style>
</head>

<body>

<nav class="main-nav">
<a href="index.html" class="logo">Khao Kho Empire</a>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="collections.html">Land Collection</a>
<a href="investment.html">Investment</a>
<a href="contact.html">Contact</a>
</div>
</nav>

<section class="hero">
<div>
<h1>Khao Kho Empire</h1>
<p>Luxury Mountain Land & Pool Villa House</p>
</div>
</section>

<section class="section">
<h2>Luxury Gallery</h2>

<div class="slider" id="slider">
<div class="slides" id="slides">
<img src="gallery1.jpg">
<img src="gallery2.jpg">
<img src="gallery3.jpg">
<img src="gallery4.jpg">
<img src="gallery5.jpg">
<img src="gallery6.jpg">
<img src="gallery7.jpg">
<img src="gallery8.jpg">
<img src="gallery9.jpg">
<img src="gallery10.jpg">
</div>

<button class="prev" onclick="prevSlide()">❮</button>
<button class="next" onclick="nextSlide()">❯</button>

</div>
</section>

<footer style="background:#1f2e20;color:#ccc;text-align:center;padding:30px;">
© 2026 Khao Kho Empire. All Rights Reserved.
</footer>

<script>
let currentIndex = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

function updateSlide(){
slides.style.transform = `translateX(-${currentIndex * 100}%)`;
}

function nextSlide(){
currentIndex = (currentIndex + 1) % totalSlides;
updateSlide();
}

function prevSlide(){
currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
updateSlide();
}

/* Auto Slide (ช้าและดูโปร) */
let autoSlide = setInterval(nextSlide, 5000);

/* Pause on Hover */
document.getElementById("slider").addEventListener("mouseenter", () => {
clearInterval(autoSlide);
});

document.getElementById("slider").addEventListener("mouseleave", () => {
autoSlide = setInterval(nextSlide, 5000);
});
</script>

</body>
</html>
