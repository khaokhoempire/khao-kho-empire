<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khao Kho Empire</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#f6f6f2;color:#2f3e2e;}

/* PREMIUM NAVBAR */
.main-nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(14px);
z-index:1000;
}

.logo{
font-family:'Playfair Display',serif;
color:white;
text-decoration:none;
font-size:22px;
}

.nav-links{
display:flex;
align-items:center;
}

.nav-links a{
color:white;
text-decoration:none;
margin-left:30px;
font-weight:400;
transition:0.3s;
}

.nav-links a:hover{color:#d6e5d8;}
.nav-links a.active{
border-bottom:2px solid #d6e5d8;
padding-bottom:5px;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(20,40,20,0.5),rgba(20,40,20,0.5)),url('hidden gem.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:0 20px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:55px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
}

.btn{
padding:14px 35px;
border-radius:30px;
border:none;
background:#d6e5d8;
color:#1e2a1f;
font-weight:500;
cursor:pointer;
text-decoration:none;
display:inline-block;
transition:0.3s;
}

.btn:hover{background:#ffffff;}

/* SECTION */
.section{padding:100px 12%;}
.section h2{
font-family:'Playfair Display',serif;
font-size:40px;
margin-bottom:30px;
text-align:center;
}

/* ===== LUXURY AUTO SLIDER ===== */

.slider{
width:100%;
max-width:1200px;
margin:40px auto 0;
overflow:hidden;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

.slides{
display:flex;
width:1000%;
animation:slide 40s infinite;
}

.slides img{
width:100%;
height:500px;
object-fit:cover;
flex:0 0 100%;
}

@keyframes slide{
0%{transform:translateX(0);}
10%{transform:translateX(-100%);}
20%{transform:translateX(-200%);}
30%{transform:translateX(-300%);}
40%{transform:translateX(-400%);}
50%{transform:translateX(-500%);}
60%{transform:translateX(-600%);}
70%{transform:translateX(-700%);}
80%{transform:translateX(-800%);}
90%{transform:translateX(-900%);}
100%{transform:translateX(0);}
}

/* MOBILE */
@media (max-width:768px){

.main-nav{
flex-direction:column;
padding:15px 5%;
}

.logo{
margin-bottom:10px;
font-size:20px;
}

.nav-links{
flex-wrap:wrap;
justify-content:center;
}

.nav-links a{
margin:8px 12px;
font-size:14px;
}

.hero{height:85vh;}
.hero h1{font-size:34px;}
.hero p{font-size:16px;}

.section{padding:70px 8%;}
.section h2{font-size:28px;}

.slides img{height:250px;}
}
</style>
</head>

<body>

<nav class="main-nav">
<a href="index.html" class="logo">Khao Kho Empire</a>
<div class="nav-links">
<a href="index.html" class="active">Home</a>
<a href="collections.html">Land Collection</a>
<a href="investment.html">Investment</a>
<a href="contact.html">Contact</a>
</div>
</nav>

<section class="hero">
<div>
<h1>Khao Kho Empire</h1>
<p>Luxury Mountain Land & Pool Villa House</p>
<a href="https://line.me/ti/p/@venusproperty" target="_blank" class="btn">
Private Consultation
</a>
</div>
</section>

<section class="section">
<h2>Luxury Gallery</h2>

<div class="slider">
  <div class="slides">
    <img src="gallery1.jpg" alt="">
    <img src="gallery2.jpg" alt="">
    <img src="gallery3.jpg" alt="">
    <img src="gallery4.jpg" alt="">
    <img src="gallery5.jpg" alt="">
    <img src="gallery6.jpg" alt="">
    <img src="gallery7.jpg" alt="">
    <img src="gallery8.jpg" alt="">
    <img src="gallery9.jpg" alt="">
    <img src="gallery10.jpg" alt="">
  </div>
</div>

</section>

<footer>
© 2026 Khao Kho Empire. All Rights Reserved.
</footer>

<a href="https://line.me/ti/p/@venusproperty" target="_blank" class="line-btn">
💬 Add LINE Official
</a>

</body>
</html>
